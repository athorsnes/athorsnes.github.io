name: Stamp build timestamp

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  stamp:
    runs-on: ubuntu-latest
    # Skip if the last commit was already a build stamp (avoids infinite loop)
    if: "!contains(github.event.head_commit.message, '[build-stamp]')"

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update build timestamp in version.js
        run: |
          BUILD=$(date -u +"%Y-%m-%dT%H:%M:%S")
          sed -i "s/const TRELLEGANT_BUILD.*=.*/const TRELLEGANT_BUILD   = '${BUILD}';/" js/version.js

      - name: Commit stamped version
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/version.js
          git diff --cached --quiet || git commit -m "chore: update build timestamp [build-stamp]"
          git push
