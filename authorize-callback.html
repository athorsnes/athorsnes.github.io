<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Authorizing Trellegant…</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f9fafb;
      color: #5a6370;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <p>Authorizing… this window will close automatically.</p>
  <script>
    // Trello redirects here with the token in the URL fragment:
    // https://athorsnes.github.io/authorize-callback.html#token=xxxx
    const hash   = window.location.hash.slice(1);
    const params = new URLSearchParams(hash);
    const token  = params.get('token');

    if (token) {
      // Store in localStorage — auth.js polls for this key
      localStorage.setItem('trellegant_auth_token', token);
      window.close();
    } else {
      document.querySelector('p').textContent =
        'Authorization failed — no token found. You can close this window.';
    }
  </script>
</body>
</html>
