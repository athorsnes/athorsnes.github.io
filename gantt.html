<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trellegant – Gantt</title>

  <!-- Frappe Gantt -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/frappe-gantt/dist/frappe-gantt.css">
  <script src="https://cdn.jsdelivr.net/npm/frappe-gantt/dist/frappe-gantt.umd.js"></script>

  <!-- Trellegant -->
  <link rel="stylesheet" href="./css/styles.css">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="./js/config.js"></script>
  <script src="./js/version.js"></script>
</head>
<body class="gantt-page">

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header class="gantt-header">
    <div class="gantt-header-left">
      <button id="btn-close" class="btn-icon" title="Close">
        <img src="./icons/close.svg" alt="Close">
      </button>
      <h1 id="board-title" class="gantt-title">Gantt Chart</h1>
    </div>

    <div class="gantt-header-center">
      <div class="view-toggle" id="view-toggle">
        <button data-mode="Day">Day</button>
        <button data-mode="Week" class="active">Week</button>
        <button data-mode="Month">Month</button>
      </div>
    </div>

    <div class="gantt-header-right">
      <span id="version-badge" class="version-badge"></span>
      <button id="btn-refresh" class="btn btn-ghost" title="Refresh">
        ↻ Refresh
      </button>
      <button id="btn-new-project" class="btn btn-primary">
        + New Project
      </button>
    </div>
  </header>

  <!-- ── Status bar ─────────────────────────────────────────────────────── -->
  <div id="status-bar" class="status-bar" style="display:none;">
    <span id="status-text"></span>
  </div>

  <!-- ── Main ───────────────────────────────────────────────────────────── -->
  <main class="gantt-main" id="gantt-main">

    <!-- Left panel: groups + task rows -->
    <div class="gantt-left" id="gantt-left">
      <div class="gantt-left-header">
        <span class="col-name">Task</span>
        <span class="col-pct">Progress</span>
      </div>
      <div id="gantt-left-body"></div>
    </div>

    <!-- Right panel: Frappe Gantt chart -->
    <div class="gantt-right" id="gantt-right">
      <svg id="gantt"></svg>
    </div>

  </main>

  <!-- ── Inline add-task input (hidden until needed) ────────────────────── -->
  <div id="add-task-overlay" class="add-task-overlay" style="display:none;">
    <input id="add-task-input" type="text" placeholder="Task name…" maxlength="200">
    <button id="add-task-confirm" class="btn btn-primary btn-sm">Add</button>
    <button id="add-task-cancel" class="btn btn-ghost btn-sm">Cancel</button>
  </div>

  <script src="./js/gantt.js"></script>
</body>
</html>
